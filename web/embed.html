<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Mar — Portfolio Widget</title>
  <!--
    X-Frame-Options: This page is designed to be embedded via iframe.
    When deploying, ensure the server does NOT set X-Frame-Options: DENY.
    Use Content-Security-Policy: frame-ancestors 'self' https://*.davidbmar.com
    to restrict embedding to trusted domains while still allowing iframe usage.
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .widget-header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #21262d;
    }

    .widget-header h1 {
      font-size: 18px;
      color: #58a6ff;
      margin-bottom: 4px;
    }

    .widget-header .repo-count {
      font-size: 12px;
      color: #8b949e;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    .cluster-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .cluster-tag {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      color: #c9d1d9;
    }

    .cluster-tag .count {
      color: #8b949e;
      margin-left: 4px;
    }

    .repo-list {
      list-style: none;
    }

    .repo-item {
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
    }

    .repo-item:last-child {
      border-bottom: none;
    }

    .repo-name {
      color: #58a6ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }

    .repo-name:hover {
      text-decoration: underline;
    }

    .repo-meta {
      font-size: 12px;
      color: #8b949e;
      margin-top: 2px;
    }

    .repo-meta .lang {
      color: #c9d1d9;
    }

    .repo-desc {
      font-size: 12px;
      color: #8b949e;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #21262d;
      color: #58a6ff;
      text-decoration: none;
      font-size: 13px;
    }

    .footer-link:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      color: #8b949e;
      padding: 32px 0;
    }

    .error {
      text-align: center;
      color: #f85149;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div id="widget-root">
    <div class="loading">Loading portfolio...</div>
  </div>

  <script>
    (function () {
      'use strict';

      var root = document.getElementById('widget-root');

      Promise.all([
        fetch('data/repos.json').then(function (r) { return r.json(); }),
        fetch('data/clusters.json').then(function (r) { return r.json(); })
      ])
      .then(function (data) {
        var repos = data[0];
        var clusters = data[1];
        render(repos, clusters);
      })
      .catch(function (err) {
        root.textContent = '';
        var errDiv = document.createElement('div');
        errDiv.className = 'error';
        errDiv.textContent = 'Failed to load portfolio data.';
        root.appendChild(errDiv);
        console.error('Embed widget error:', err);
      });

      function render(repos, clusters) {
        var totalRepos = repos.length;

        // Sort repos by relevance_score (desc), then stars (desc)
        var sortedRepos = repos.slice().sort(function (a, b) {
          var scoreA = a.relevance_score || 0;
          var scoreB = b.relevance_score || 0;
          if (scoreB !== scoreA) return scoreB - scoreA;
          return (b.stars || 0) - (a.stars || 0);
        });

        var topRepos = sortedRepos.slice(0, 10);
        var topClusters = clusters.slice(0, 5);

        // Clear loading state
        root.textContent = '';

        // Header
        var header = document.createElement('div');
        header.className = 'widget-header';
        var h1 = document.createElement('h1');
        h1.textContent = 'David Mar';
        header.appendChild(h1);
        var countDiv = document.createElement('div');
        countDiv.className = 'repo-count';
        countDiv.textContent = totalRepos + ' repositories';
        header.appendChild(countDiv);
        root.appendChild(header);

        // Clusters
        if (topClusters.length > 0) {
          var clusterTitle = document.createElement('div');
          clusterTitle.className = 'section-title';
          clusterTitle.textContent = 'Capability Areas';
          root.appendChild(clusterTitle);

          var clusterList = document.createElement('ul');
          clusterList.className = 'cluster-list';
          topClusters.forEach(function (c) {
            var li = document.createElement('li');
            li.className = 'cluster-tag';
            li.textContent = c.name;
            var countSpan = document.createElement('span');
            countSpan.className = 'count';
            countSpan.textContent = '(' + c.repos.length + ')';
            li.appendChild(countSpan);
            clusterList.appendChild(li);
          });
          root.appendChild(clusterList);
        }

        // Top repos
        var repoTitle = document.createElement('div');
        repoTitle.className = 'section-title';
        repoTitle.textContent = 'Top Repositories';
        root.appendChild(repoTitle);

        var repoList = document.createElement('ul');
        repoList.className = 'repo-list';
        topRepos.forEach(function (repo) {
          var li = document.createElement('li');
          li.className = 'repo-item';

          var nameLink = document.createElement('a');
          nameLink.className = 'repo-name';
          nameLink.href = repo.url || '#';
          nameLink.target = '_blank';
          nameLink.rel = 'noopener';
          nameLink.textContent = repo.name;
          li.appendChild(nameLink);

          var metaParts = [];
          if (repo.language) metaParts.push(repo.language);
          if (typeof repo.stars === 'number') metaParts.push(repo.stars + ' stars');
          if (metaParts.length > 0) {
            var metaDiv = document.createElement('div');
            metaDiv.className = 'repo-meta';
            metaDiv.textContent = metaParts.join(' \u00b7 ');
            li.appendChild(metaDiv);
          }

          if (repo.description) {
            var descDiv = document.createElement('div');
            descDiv.className = 'repo-desc';
            descDiv.textContent = repo.description;
            li.appendChild(descDiv);
          }

          repoList.appendChild(li);
        });
        root.appendChild(repoList);

        // Footer link
        var footerLink = document.createElement('a');
        footerLink.className = 'footer-link';
        footerLink.href = 'https://davidbmar.com';
        footerLink.target = '_top';
        footerLink.textContent = 'View full portfolio \u2192';
        root.appendChild(footerLink);
      }
    })();
  </script>
</body>
</html>
