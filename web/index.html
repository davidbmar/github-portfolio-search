<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="David Mar's engineering portfolio — 104 repositories across 6 capability areas including Voice &amp; Speech, Transcription, Browser-Native AI, AWS Infrastructure, and more. Search by topic, language, or keyword.">
  <meta property="og:title" content="David Mar — GitHub Portfolio Search">
  <meta property="og:description" content="104 repositories across 6 capability areas. Explore voice AI, infrastructure, search tools, and more.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://davidbmar.com">
  <meta property="og:image" content="https://davidbmar.com/og-image.png">
  <link rel="canonical" href="https://davidbmar.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="David Mar — Software Engineer Portfolio">
  <meta name="twitter:description" content="104 repositories across 6 capability areas. Explore projects in Python, TypeScript, Shell, and more.">
  <meta name="twitter:image" content="https://davidbmar.com/og-image.png">
  <title>davidbmar.com — GitHub Portfolio Search</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='https://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F50D;</text></svg>">
  <link rel="stylesheet" href="css/style.css">

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "David Mar — GitHub Portfolio Search",
    "url": "https://davidbmar.com",
    "description": "Semantic search engine for 104+ GitHub repositories across voice AI, infrastructure, transcription, and more.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://davidbmar.com/#/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Structured Data: Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "David Mar",
    "url": "https://davidbmar.com",
    "sameAs": [
      "https://github.com/davidbmar"
    ],
    "jobTitle": "Software Engineer",
    "knowsAbout": ["Voice AI", "AWS Infrastructure", "Transcription", "Browser-Native AI", "Semantic Search"]
  }
  </script>
</head>
<body>
  <header class="site-header">
    <h1><a href="#/">davidbmar.com</a></h1>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="#/" class="nav-link">Home</a>
      <a href="#/search" class="nav-link">Search</a>
      <a href="#/clusters" class="nav-link">Clusters</a>
      <a href="#/access" class="nav-link">Request Access</a>
    </nav>
    <div class="search-box" id="header-search">
      <input type="text" id="search-input" placeholder="Search repositories..." autocomplete="off" aria-label="Search repositories">
      <span class="search-icon" aria-hidden="true">&#128269;</span>
      <div class="autocomplete-dropdown" id="autocomplete-dropdown" role="listbox" aria-label="Search suggestions"></div>
    </div>
  </header>

  <main class="main-content" id="content">
    <div class="loading">Loading portfolio data</div>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://d3js.org/d3.v7.min.js" crossorigin="anonymous"></script>
  <script src="js/d3-viz.js"></script>
  <script src="js/search.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
